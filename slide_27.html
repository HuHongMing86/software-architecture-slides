<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #F0F4F8;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            position: relative;
            overflow: hidden;
        }
        .left-pane {
            width: 35%;
            height: 100%;
            background-color: #102A43;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 50px;
            z-index: 2;
            border-right: 5px solid #B12A2A;
        }
        .right-pane {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 60px;
            position: relative;
            background-color: #F0F4F8;
        }
        /* Blueprint grid pattern */
        .right-pane::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(#334E68 1px, transparent 1px),
                linear-gradient(90deg, #334E68 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.05;
            z-index: 1;
        }
        h1 {
            font-size: 42px;
            font-weight: 800;
            color: #F0F4F8;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 24px;
            font-weight: 400;
            font-style: italic;
            color: #D9E2EC;
            line-height: 1.4;
        }
        .ratings-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 50px;
            width: 100%;
            position: relative;
            z-index: 2;
            background-color: rgba(240, 244, 248, 0.95);
            padding: 40px;
            border: 3px solid #102A43;
        }
        .rating-column {
            display: flex;
            flex-direction: column;
        }
        .rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #D9E2EC;
        }
        .rating-column .rating-row:last-child {
            border-bottom: none;
        }
        .rating-name {
            font-size: 22px;
            font-weight: bold;
            color: #102A43;
        }
        .rating-value {
            font-size: 18px;
            color: #B12A2A;
            letter-spacing: 2px;
            display: flex;
        }
        .rating-text {
            font-size: 20px;
            color: #334E68;
            font-weight: bold;
        }
    </style>
</head>
<body><div class="slide-container">
        <div class="left-pane" style="transform: translate(0px, 122.894px);">
            <h1>Microservices Excel in Deployability, Elasticity, and Evolutionary Design</h1>
            <h2>Architecture Characteristics Ratings</h2>
        </div>
        <div class="right-pane">
            <div class="ratings-container" style="transform: translate(0px, 99.8914px);">
                <div class="rating-column">
                    <div class="rating-row">
                        <div class="rating-name">Partition Type</div>
                        <div class="rating-text">Domain</div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Arch Quantum</div>
                        <div class="rating-text">1</div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Deployability</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                        </div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Elasticity</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                        </div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Evolutionary</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                        </div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Fault Tolerance</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i>
                        </div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Modularity</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                        </div>
                    </div>
                </div>
                <div class="rating-column">
                    <div class="rating-row">
                        <div class="rating-name">Overall Cost</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i>
                        </div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Performance</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i>
                        </div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Reliability</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i>
                        </div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Scalability</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                        </div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Simplicity</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i>
                        </div>
                    </div>
                    <div class="rating-row">
                        <div class="rating-name">Testability</div>
                        <div class="rating-value">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
