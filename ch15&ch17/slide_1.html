<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #F0F4F8;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            position: relative;
            overflow: hidden;
        }
        /* Blueprint grid pattern */
        .slide-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(#334E68 1px, transparent 1px),
                linear-gradient(90deg, #334E68 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.05;
            z-index: 1;
        }
        .left-pane {
            width: 60%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 80px;
            z-index: 2;
            background: linear-gradient(90deg, #F0F4F8 80%, transparent);
        }
        .right-pane {
            width: 40%;
            height: 100%;
            background-color: #D9E2EC;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .right-pane::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 5px;
            background-color: #B12A2A;
        }
        h1 {
            font-size: 64px;
            font-weight: 800;
            color: #102A43;
            line-height: 1.2;
            margin-bottom: 24px;
        }
        h2 {
            font-size: 32px;
            font-weight: 400;
            font-style: italic;
            color: #334E68;
            line-height: 1.4;
            margin-bottom: 40px;
        }
        .presenter {
            font-size: 20px;
            color: #B12A2A;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* Abstract Architectural SVG */
        .abstract-art {
            width: 80%;
            height: auto;
            opacity: 0.8;
        }
    </style>
</head>
<body><div class="slide-container">
        <div class="left-pane" style="transform: translate(0px, 84.1546px);">
            <h1>Software Architecture:<br>Space-Based &amp; Microservices</h1>
            <h2>A Comprehensive Summary of Chapters 15 &amp; 17</h2>
            <div class="presenter">
</div>
        </div>
        <div class="right-pane" style="transform: translate(0px, 103.312px);">
            <svg class="abstract-art" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <rect x="20" y="20" width="60" height="160" fill="none" stroke="#102A43" stroke-width="4"></rect>
                <rect x="100" y="60" width="80" height="120" fill="none" stroke="#334E68" stroke-width="4"></rect>
                <circle cx="50" cy="50" r="15" fill="#B12A2A"></circle>
                <line x1="80" y1="80" x2="100" y2="80" stroke="#B12A2A" stroke-width="4" stroke-dasharray="4"></line>
                <line x1="80" y1="120" x2="100" y2="120" stroke="#B12A2A" stroke-width="4" stroke-dasharray="4"></line>
                <circle cx="140" cy="100" r="10" fill="#102A43"></circle>
                <circle cx="140" cy="140" r="10" fill="#102A43"></circle>
            </svg>
        </div>
    </div>
</body>
</html>
